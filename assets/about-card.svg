<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="about-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ff;stop-opacity:1">
        <animate attributeName="stop-color" values="#0ff;#f0f;#0ff" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#f0f;stop-opacity:1">
        <animate attributeName="stop-color" values="#f0f;#0ff;#f0f" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gs">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    @keyframes borderPulse { 0%,100% { stroke-opacity: 0.4; } 50% { stroke-opacity: 1; } }
    @keyframes scanDown { 0% { transform: translateY(-20px); opacity: 0; } 50% { opacity: 0.15; } 100% { transform: translateY(220px); opacity: 0; } }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes flow { to { stroke-dashoffset: -40; } }
  </style>

  <!-- Card bg -->
  <rect x="1" y="1" width="898" height="198" rx="10" fill="#0d0d14"/>
  <rect x="1" y="1" width="898" height="198" rx="10" fill="none" stroke="url(#about-grad)" stroke-width="1.5" style="animation: borderPulse 3s ease-in-out infinite" stroke-dasharray="10 10" class="flow-border">
    <animate attributeName="stroke-dashoffset" from="0" to="-40" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Scan -->
  <rect x="2" y="0" width="896" height="40" rx="10" fill="#0ff" opacity="0.05" style="animation: scanDown 4s linear infinite"/>

  <!-- Corner brackets -->
  <g filter="url(#g)" opacity="0.7">
    <path d="M15,25 L15,12 L28,12" fill="none" stroke="#0ff" stroke-width="1.5"/>
    <path d="M872,12 L885,12 L885,25" fill="none" stroke="#0ff" stroke-width="1.5"/>
    <path d="M15,175 L15,188 L28,188" fill="none" stroke="#f0f" stroke-width="1.5"/>
    <path d="M872,188 L885,188 L885,175" fill="none" stroke="#f0f" stroke-width="1.5"/>
  </g>

  <!-- Section label -->
  <text x="450" y="32" font-family="'Courier New', monospace" font-size="11" fill="#0ff" text-anchor="middle" filter="url(#gs)" opacity="0.6">
    ▸ NEURAL_PROFILE.DATASTREAM ◂
  </text>

  <!-- Content -->
  <g font-family="'Courier New', monospace" font-size="13">
    <text x="45" y="62" fill="#0ff" filter="url(#gs)">▹</text>
    <text x="65" y="62" fill="#c8d6e5">Building</text>
    <text x="138" y="62" fill="#f0f" font-weight="bold">FureVex VPN</text>
    <text x="275" y="62" fill="#c8d6e5">— scalable multi-protocol infra on AWS</text>

    <text x="45" y="88" fill="#0ff" filter="url(#gs)">▹</text>
    <text x="65" y="88" fill="#c8d6e5">Architecting</text>
    <text x="178" y="88" fill="#f0f" font-weight="bold">QA Automation</text>
    <text x="330" y="88" fill="#c8d6e5">— Robot Framework, Selenium, Playwright</text>

    <text x="45" y="114" fill="#0ff" filter="url(#gs)">▹</text>
    <text x="65" y="114" fill="#c8d6e5">Performance testing with</text>
    <text x="275" y="114" fill="#0f0" font-weight="bold">K6</text>
    <text x="300" y="114" fill="#c8d6e5">+ real-time</text>
    <text x="397" y="114" fill="#0f0" font-weight="bold">Grafana</text>
    <text x="470" y="114" fill="#c8d6e5">monitoring</text>

    <text x="45" y="140" fill="#0ff" filter="url(#gs)">▹</text>
    <text x="65" y="140" fill="#c8d6e5">Automating</text>
    <text x="170" y="140" fill="#f0f" font-weight="bold">CI/CD pipelines</text>
    <text x="340" y="140" fill="#c8d6e5">with GitHub Actions + Docker</text>

    <text x="45" y="166" fill="#0ff" filter="url(#gs)">▹</text>
    <text x="65" y="166" fill="#c8d6e5">Learning</text>
    <text x="138" y="166" fill="#0ff" font-weight="bold">IaC</text>
    <text x="168" y="166" fill="#888">,</text>
    <text x="180" y="166" fill="#0ff" font-weight="bold">Cloud DevOps</text>
    <text x="320" y="166" fill="#888">,</text>
    <text x="332" y="166" fill="#0ff" font-weight="bold">AI-driven automation</text>
  </g>

  <!-- Cursor blink -->
  <rect x="520" y="156" width="8" height="15" fill="#0ff" style="animation: blink 1s step-end infinite"/>
</svg>
