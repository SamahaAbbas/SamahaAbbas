<svg xmlns="http://www.w3.org/2000/svg" width="900" height="40" viewBox="0 0 900 40">
  <defs>
    <linearGradient id="div-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1"/>
      <stop offset="20%" style="stop-color:#0ff;stop-opacity:1">
        <animate attributeName="stop-color" values="#0ff;#f0f;#0ff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#f0f;stop-opacity:1">
        <animate attributeName="stop-color" values="#f0f;#0ff;#f0f" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="80%" style="stop-color:#0ff;stop-opacity:1">
        <animate attributeName="stop-color" values="#0ff;#f0f;#0ff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow-div">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    @keyframes dash { to { stroke-dashoffset: -40; } }
    @keyframes pulse { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
  </style>
  <line x1="50" y1="20" x2="850" y2="20" stroke="url(#div-grad)" stroke-width="1" filter="url(#glow-div)" stroke-dasharray="10 5" style="animation: dash 2s linear infinite"/>
  <circle cx="450" cy="20" r="4" fill="#0ff" filter="url(#glow-div)" style="animation: pulse 2s ease-in-out infinite">
    <animate attributeName="fill" values="#0ff;#f0f;#0ff" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="430" cy="20" r="2" fill="#f0f" filter="url(#glow-div)" opacity="0.7" style="animation: pulse 2s ease-in-out 0.3s infinite"/>
  <circle cx="470" cy="20" r="2" fill="#f0f" filter="url(#glow-div)" opacity="0.7" style="animation: pulse 2s ease-in-out 0.3s infinite"/>
</svg>
