<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ff;stop-opacity:1">
        <animate attributeName="stop-color" values="#0ff;#f0f;#0f0;#0ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#f0f;stop-opacity:1">
        <animate attributeName="stop-color" values="#f0f;#0ff;#f0f;#0f0" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0f0;stop-opacity:1">
        <animate attributeName="stop-color" values="#0f0;#f0f;#0ff;#0f0" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="scan-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#0ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="border-clip">
      <rect x="4" y="4" width="892" height="292" rx="12"/>
    </clipPath>
  </defs>

  <style>
    @keyframes scan { 0% { transform: translateY(-100px); } 100% { transform: translateY(400px); } }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes dash { to { stroke-dashoffset: -1000; } }
    @keyframes fadeIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes flicker { 0%,19%,21%,23%,25%,54%,56%,100% { opacity:1; } 20%,24%,55% { opacity:0.6; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes gridPulse { 0%,100% { opacity: 0.08; } 50% { opacity: 0.2; } }
    @keyframes borderFlow { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -60; } }
    @keyframes particleFloat {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateY(-120px) translateX(30px); opacity: 0; }
    }
    .scan-line { animation: scan 3s linear infinite; }
    .grid-line { animation: gridPulse 4s ease-in-out infinite; }
    .border-anim { animation: borderFlow 2s linear infinite; }
    .particle { animation: particleFloat 4s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="900" height="300" rx="14" fill="#0a0a0f"/>

  <!-- Animated border -->
  <rect x="2" y="2" width="896" height="296" rx="13" fill="none" stroke="url(#cyber-grad)" stroke-width="2" stroke-dasharray="15 15" class="border-anim" filter="url(#glow)"/>

  <!-- Grid pattern -->
  <g clip-path="url(#border-clip)">
    <g class="grid-line">
      <line x1="0" y1="0" x2="900" y2="0" stroke="#0ff" stroke-width="0.3" transform="translate(0,50)"/>
      <line x1="0" y1="0" x2="900" y2="0" stroke="#0ff" stroke-width="0.3" transform="translate(0,100)"/>
      <line x1="0" y1="0" x2="900" y2="0" stroke="#0ff" stroke-width="0.3" transform="translate(0,150)"/>
      <line x1="0" y1="0" x2="900" y2="0" stroke="#0ff" stroke-width="0.3" transform="translate(0,200)"/>
      <line x1="0" y1="0" x2="900" y2="0" stroke="#0ff" stroke-width="0.3" transform="translate(0,250)"/>
      <line x1="100" y1="0" x2="100" y2="300" stroke="#0ff" stroke-width="0.3"/>
      <line x1="200" y1="0" x2="200" y2="300" stroke="#0ff" stroke-width="0.3"/>
      <line x1="300" y1="0" x2="300" y2="300" stroke="#0ff" stroke-width="0.3"/>
      <line x1="400" y1="0" x2="400" y2="300" stroke="#0ff" stroke-width="0.3"/>
      <line x1="500" y1="0" x2="500" y2="300" stroke="#0ff" stroke-width="0.3"/>
      <line x1="600" y1="0" x2="600" y2="300" stroke="#0ff" stroke-width="0.3"/>
      <line x1="700" y1="0" x2="700" y2="300" stroke="#0ff" stroke-width="0.3"/>
      <line x1="800" y1="0" x2="800" y2="300" stroke="#0ff" stroke-width="0.3"/>
    </g>

    <!-- Scan line -->
    <rect class="scan-line" x="0" y="0" width="900" height="80" fill="url(#scan-grad)"/>

    <!-- Floating particles -->
    <circle cx="120" cy="250" r="2" fill="#0ff" class="particle" style="animation-delay:0s"/>
    <circle cx="300" cy="280" r="1.5" fill="#f0f" class="particle" style="animation-delay:1s"/>
    <circle cx="500" cy="260" r="2" fill="#0f0" class="particle" style="animation-delay:2s"/>
    <circle cx="680" cy="270" r="1.5" fill="#0ff" class="particle" style="animation-delay:0.5s"/>
    <circle cx="800" cy="250" r="2" fill="#f0f" class="particle" style="animation-delay:1.5s"/>
    <circle cx="200" cy="240" r="1" fill="#0ff" class="particle" style="animation-delay:3s"/>
    <circle cx="400" cy="270" r="1" fill="#f0f" class="particle" style="animation-delay:2.5s"/>
    <circle cx="600" cy="245" r="1.5" fill="#0f0" class="particle" style="animation-delay:3.5s"/>
    <circle cx="750" cy="260" r="1" fill="#0ff" class="particle" style="animation-delay:0.8s"/>
  </g>

  <!-- Corner decorations -->
  <g filter="url(#glow)" style="animation: pulse 2s ease-in-out infinite">
    <path d="M20,35 L20,20 L35,20" fill="none" stroke="#0ff" stroke-width="2"/>
    <path d="M865,20 L880,20 L880,35" fill="none" stroke="#0ff" stroke-width="2"/>
    <path d="M20,265 L20,280 L35,280" fill="none" stroke="#f0f" stroke-width="2"/>
    <path d="M865,280 L880,280 L880,265" fill="none" stroke="#f0f" stroke-width="2"/>
  </g>

  <!-- HUD elements -->
  <g opacity="0.5" style="animation: pulse 3s ease-in-out infinite">
    <text x="50" y="45" font-family="monospace" font-size="9" fill="#0ff">SYS://NEURAL_LINK_v7.2</text>
    <text x="700" y="45" font-family="monospace" font-size="9" fill="#f0f">STATUS: ONLINE ●</text>
    <text x="50" y="270" font-family="monospace" font-size="9" fill="#0f0">QUANTUM_CORE: ACTIVE</text>
    <text x="690" y="270" font-family="monospace" font-size="9" fill="#0ff">UPLINK: 99.97% ▲</text>
  </g>

  <!-- Main title -->
  <g filter="url(#glow-strong)">
    <text x="450" y="115" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="url(#cyber-grad)" text-anchor="middle" style="animation: flicker 4s linear infinite">
      SAMAHA ABBAS
    </text>
  </g>

  <!-- Subtitle with typing cursor effect -->
  <text x="450" y="155" font-family="'Courier New', monospace" font-size="16" fill="#0ff" text-anchor="middle" filter="url(#glow)" opacity="0.9">
    ⟨ DevOps Engineer • QA Architect • Systems Automator ⟩
  </text>

  <!-- Animated underline -->
  <line x1="200" y1="170" x2="700" y2="170" stroke="url(#cyber-grad)" stroke-width="1" stroke-dasharray="500" stroke-dashoffset="500" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" from="500" to="0" dur="2s" fill="freeze"/>
  </line>

  <!-- Tagline -->
  <text x="450" y="205" font-family="monospace" font-size="13" fill="#888" text-anchor="middle" style="animation: float 3s ease-in-out infinite">
    「 Automating the future, one pipeline at a time 」
  </text>

  <!-- Bottom bar -->
  <rect x="100" y="230" width="700" height="1" fill="url(#cyber-grad)" opacity="0.3"/>
  <g font-family="monospace" font-size="11" text-anchor="middle" filter="url(#glow)">
    <text x="225" y="250" fill="#0ff">⬡ INFRASTRUCTURE</text>
    <text x="390" y="250" fill="#f0f">⬡ AUTOMATION</text>
    <text x="535" y="250" fill="#0f0">⬡ TESTING</text>
    <text x="675" y="250" fill="#0ff">⬡ CLOUD</text>
  </g>
</svg>
